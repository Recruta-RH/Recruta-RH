<head>

  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#F8FAFC;color:#0F172A}
    input,select,textarea{width:100%;padding:8px 10px;border:1px solid #E5E7EB;border-radius:7px;font-size:13px;font-family:inherit;color:#0F172A;outline:none;background:#fff}
    input:focus,select:focus,textarea:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
    textarea{resize:vertical;min-height:80px}
    select{cursor:pointer}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .spin{animation:spin .8s linear infinite}
    .pulse{animation:pulse 1.2s ease-in-out infinite}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:99px}
    ::-webkit-scrollbar-thumb:hover{background:#CBD5E1}
  </style>

<style>
/* ═══════════════════════════════════════════════════
   VISUAL POLISH — purely aesthetic, zero functional change
   ═══════════════════════════════════════════════════ */

/* ── Sidebar upgrade ─────────────────────────────── */
/* Gradient depth on sidebar */
[style*="background:#0F172A"],[style*="background: #0F172A"] {
  background: linear-gradient(180deg, #0F172A 0%, #111827 100%) !important;
}

/* ── Global card elevation ───────────────────────── */
/* Cards get subtle shadow + hover lift */
[style*="border:1px solid #E5E7EB"][style*="border-radius"] {
  box-shadow: 0 1px 3px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
  transition: box-shadow .2s ease, transform .2s ease;
}
[style*="border:1px solid #E5E7EB"][style*="border-radius"]:hover {
  box-shadow: 0 4px 12px rgba(15,23,42,.08), 0 2px 4px rgba(15,23,42,.05);
}

/* ── KPI cards — gradient accent top border ──────── */
/* Primary KPI row gets a subtle top gradient line */
[style*="display:grid"][style*="repeat(5"] > div:first-child,
[style*="display:grid"][style*="repeat(5,1fr)"] > div:first-child {
  border-top: 3px solid #2563EB;
  border-radius: 0 0 0 10px;
}

/* ── Blue primary elements — gradient ────────────── */
[style*="background:#2563EB"],[style*="background: #2563EB"] {
  background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%) !important;
  box-shadow: 0 2px 8px rgba(37,99,235,.25) !important;
}
[style*="background:#2563EB"]:hover,[style*="background: #2563EB"]:hover {
  box-shadow: 0 4px 14px rgba(37,99,235,.35) !important;
  transform: translateY(-1px);
}

/* ── Insight / alert blocks — left accent bars ───── */
/* Already has border-left in template — add glow */
[style*="border-left:3px solid #DC2626"] {
  box-shadow: inset 0 0 0 1px rgba(220,38,38,.08);
}
[style*="border-left:3px solid #EA580C"] {
  box-shadow: inset 0 0 0 1px rgba(234,88,12,.08);
}
[style*="border-left:3px solid #16A34A"] {
  box-shadow: inset 0 0 0 1px rgba(22,163,74,.08);
}
[style*="border-left:3px solid #2563EB"] {
  box-shadow: inset 0 0 0 1px rgba(37,99,235,.08);
}

/* ── Score ring — glow ───────────────────────────── */
circle[stroke="#2563EB"] {
  filter: drop-shadow(0 0 4px rgba(37,99,235,.3));
}

/* ── Executive summary hero — premium feel ────────── */
[style*="background:#F0F4FF"] {
  background: linear-gradient(135deg, #EEF2FF 0%, #F0F4FF 100%) !important;
  border: 1px solid #C7D6FF !important;
  box-shadow: 0 2px 8px rgba(37,99,235,.06) !important;
}

/* ── Badge pills — subtle shadow ─────────────────── */
[style*="border-radius:99px"][style*="background:#EFF6FF"],
[style*="border-radius:99px"][style*="background:#F0FDF4"],
[style*="border-radius:99px"][style*="background:#FFF7ED"],
[style*="border-radius:99px"][style*="background:#FEF2F2"],
[style*="border-radius:99px"][style*="background:#F5F3FF"] {
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}

/* ── Nav items — smooth hover ────────────────────── */
button[style*="background:rgba(37,99,235,.18)"] {
  box-shadow: inset 0 0 0 1px rgba(147,197,253,.15);
}

/* ── Table rows — hover highlight ────────────────── */
tr:hover td {
  background: #F8FAFC;
  transition: background .15s;
}

/* ── Input focus — refined ───────────────────────── */
input:focus, select:focus, textarea:focus {
  box-shadow: 0 0 0 3px rgba(37,99,235,.1), 0 1px 3px rgba(37,99,235,.08) !important;
}

/* ── Scrollbar — thinner, more refined ──────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 99px; }

/* ── Tabler icon sizing boost ────────────────────── */
.ti { font-size: 15px; }
.ti-layout-dashboard, .ti-briefcase, .ti-users,
.ti-git-merge, .ti-chart-bar, .ti-database,
.ti-file-search { font-size: 16px; }

/* ── Candidate list rows — hover ─────────────────── */
[style*="border-bottom:1px solid #F8FAFC"][style*="cursor:pointer"]:hover {
  background: #F8FAFC !important;
  transition: background .15s;
}

/* ── Success recommendation banner ──────────────── */
[style*="background:#F0FDF4"][style*="border-left:3px solid #16A34A"] {
  background: linear-gradient(135deg, #F0FDF4 0%, #ECFDF5 100%) !important;
}

/* ── Microinteraction: buttons ───────────────────── */
button { transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease; }
button:active { transform: scale(.97) !important; }

/* ── SLA bar fills — animated on load ───────────── */
@keyframes barGrow { from { width: 0 } }
[style*="height:4px"][style*="border-radius:99px"]:not([style*="background:#E5E7EB"]) {
  animation: barGrow .6s ease-out;
}

/* ── Smooth fade-in for main content ─────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
[style*="flex:1;overflow-y:auto"] > div {
  animation: fadeUp .3s ease-out;
}

/* ── Sidebar logo icon — refined ─────────────────── */
[style*="background:#2563EB"][style*="border-radius:6px"][style*="font-size:11px"] {
  box-shadow: 0 2px 8px rgba(37,99,235,.4) !important;
  background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%) !important;
}

/* ── Dashboard KPI numbers — sharper ─────────────── */
[style*="font-size:26px"][style*="font-weight:700"],
[style*="font-size:28px"][style*="font-weight:700"],
[style*="font-size:24px"][style*="font-weight:700"] {
  letter-spacing: -.5px;
}

/* ── Section headers — tracking ─────────────────── */
[style*="text-transform:uppercase"][style*="letter-spacing"] {
  letter-spacing: .07em;
}

<style>
/* Clickable KPI hover */
[v-for*="dashCards"]:hover { box-shadow: 0 4px 14px rgba(15,23,42,.1) !important; transform: translateY(-2px); }
</style>
</style>
<style id="rs-ds">
/* ═══════════════════════════════════
   R&S RH — Design System v2
   ═══════════════════════════════════ */

/* ── GLOBAL TYPOGRAPHY SYSTEM ── */
h1{font-size:22px!important;font-weight:800!important;letter-spacing:-.4px!important}

/* ── TABLE PREMIUM ── */
table thead tr{background:#F8FAFC}
table thead th{text-align:left;font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.07em;padding:11px 16px;border-bottom:1px solid #E5E7EB}
table tbody tr{transition:background .12s ease}
table tbody tr:hover td{background:#F8FAFC!important}
table tbody td{padding:13px 16px;border-bottom:1px solid #F8FAFC;vertical-align:middle}

/* ── PIPELINE CARD HOVER ── */
@keyframes cardIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.pip-card{animation:cardIn .2s ease both}

/* ── CONSISTENT CARD SHADOW ── */
[style*="border:1px solid #E5E7EB"][style*="border-radius:1"]{
  box-shadow:0 1px 3px rgba(15,23,42,.05),0 1px 2px rgba(15,23,42,.03)
}

/* ── HOVER LIFT for clickable cards ── */
[style*="cursor:pointer"][style*="border-radius"][style*="background:#fff"]:hover{
  box-shadow:0 6px 20px rgba(15,23,42,.09),0 2px 6px rgba(15,23,42,.05)!important;
  transform:translateY(-2px)
}

/* ── DROP ZONE ── */
[style*="border:2px dashed"]{transition:all .2s ease}

/* ── SCORE RING GLOW ── */
circle[stroke="#16A34A"]{filter:drop-shadow(0 0 4px rgba(22,163,74,.3))}
circle[stroke="#EA580C"]{filter:drop-shadow(0 0 4px rgba(234,88,12,.2))}
circle[stroke="#DC2626"]{filter:drop-shadow(0 0 4px rgba(220,38,38,.2))}

/* ── TABS ── */
[style*="border-bottom:2px solid #2563EB"]{color:#2563EB!important;font-weight:600!important}

/* ── SCREEN FADE ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── INPUT REFINED ── */
input,select,textarea{transition:border-color .15s,box-shadow .15s}

/* ── SCROLLBAR REFINED ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:#94A3B8}

/* ── BADGE SYSTEM ── */
[style*="borderRadius:'99px'"][style*="background:#EFF6FF"]{letter-spacing:.01em}
[style*="borderRadius:'99px'"][style*="background:#F0FDF4"]{letter-spacing:.01em}
[style*="borderRadius:'99px'"][style*="background:#FFF7ED"]{letter-spacing:.01em}
</style>
</head>

<style>
  #rs-login{position:fixed!important;top:0!important;right:0!important;bottom:0!important;left:0!important;z-index:99999!important;}
  .rs-hidden{display:none!important;}
</style>
<div id="rs-login" style="position:fixed;top:0;right:0;bottom:0;left:0;background:linear-gradient(135deg,#0F172A 0%,#1E3A8A 60%,#2563EB 100%);display:flex;align-items:center;justify-content:center;padding:20px;z-index:99999;font-family:Inter,sans-serif">
  <div style="background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,.3)">
    <div style="text-align:center;margin-bottom:28px">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;background:linear-gradient(135deg,#1E3A8A,#2563EB);border-radius:14px;margin-bottom:12px">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div style="font-size:20px;font-weight:800;color:#0F172A;letter-spacing:-.3px">R&amp;S RH</div>
      <div style="font-size:12px;color:#64748B;margin-top:3px">Inteligência em Pessoas</div>
    </div>
    <form onsubmit="rsDoLogin();return false;" autocomplete="on" method="dialog">
      <div style="margin-bottom:14px">
        <label style="font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px">Usuário</label>
        <input id="rs-u" type="text" name="username" autocomplete="username" placeholder="Seu nome" style="width:100%;padding:10px 12px;border:1.5px solid #E5E7EB;border-radius:9px;font-size:13px;font-family:Inter,sans-serif;color:#0F172A;background:#F8FAFC;outline:none;box-sizing:border-box"/>
      </div>
      <div style="margin-bottom:18px">
        <label style="font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px">Senha</label>
        <input id="rs-p" type="password" name="password" autocomplete="current-password" placeholder="••••••••" style="width:100%;padding:10px 12px;border:1.5px solid #E5E7EB;border-radius:9px;font-size:13px;font-family:Inter,sans-serif;color:#0F172A;background:#F8FAFC;outline:none;box-sizing:border-box"/>
      </div>
      <div id="rs-err" style="display:none;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:9px 12px;font-size:12px;color:#DC2626;margin-bottom:14px">Usuário ou senha incorretos.</div>
      <button type="submit" style="width:100%;background:linear-gradient(135deg,#1E3A8A,#2563EB);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;box-shadow:0 4px 14px rgba(37,99,235,.35)">Entrar</button>
    </form>
    <p style="text-align:center;font-size:11px;color:#94A3B8;margin-top:18px">Acesso restrito &middot; R&amp;S RH</p>
  </div>
</div>
<script>
window.RS_USERS=[
  {id:'rodrigo',name:'Rodrigo Santos',firstName:'Rodrigo',password:'Rodrigo@2026',role:'admin'},
  {id:'luciana',name:'Luciana Montozo',firstName:'Luciana',password:'Luciana@2026',role:'user'},
  {id:'mariana',name:'Mariana Luduvice',firstName:'Mariana',password:'Mariana@2026',role:'user'}
];
function rsDoLogin(){
  var u=(document.getElementById('rs-u').value||'').trim().toLowerCase();
  var p=document.getElementById('rs-p').value||'';
  var found=window.RS_USERS.find(function(x){return x.name.toLowerCase()===u||x.firstName.toLowerCase()===u||x.id===u;});
  if(!found||found.password!==p){document.getElementById('rs-err').style.display='block';return;}
  document.getElementById('rs-err').style.display='none';
  try{localStorage.setItem('rsrh_user',found.id);}catch(e){}
  if(window._vueSetUser)window._vueSetUser(found);
}
(function(){
  try{
    var s=localStorage.getItem('rsrh_user');
    if(s){var u=window.RS_USERS.find(function(x){return x.id===s;});if(u)window.RS_USER=u;}
  }catch(e){}
})();
</script>

  <script type="text/html" id="app-tpl">

<div v-if="showApiModal" style="position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999">

function generateParecer(candidate, summary, interviewDate) {

  var recBorder = isPos ? '#86efac' : '#fca5a5';
  var recIcon   = isPos ? '\u2713' : '\u00d7';
  var salario   = summary.expectativaSalarial || candidate.salario || '';
  var disponib  = summary.disponibilidade || candidate.disponibilidade || '';

  }
  function block(label, value, color, bg) {

      + '</div>';

        + '<span style="color:'+col+';font-weight:700;font-size:11px;line-height:1.5;flex-shrink:0">&#8226;</span>'

    + '</style></head><body>'

  }).join('');
  var html='<!DOCTYPE html>'
    +'<html lang="pt-BR"><head><meta charset="UTF-8"\/><title>R&amp;S RH<\/title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8fafc}@media print{body{background:#fff}.np{display:none!important}@page{margin:15mm;size:A4}}<\/style><\/head><body>'
    +'<div class="np" style="position:fixed;top:16px;right:16px;z-index:99;display:flex;gap:8px"><div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:8px 14px;font-size:12px;color:#64748b">Pressione <strong>Ctrl+P<\/strong> para salvar como PDF<\/div><button onclick="window.print()" style="background:#4f46e5;color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer">Salvar PDF<\/button><\/div>'
    +'<div style="max-width:800px;margin:0 auto;padding:32px 24px"><div style="background:#1e1b4b;border-radius:14px;padding:24px 28px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:22px;font-weight:700;color:#fff;margin-bottom:2px">R&amp;S RH<\/div><div style="font-size:12px;color:#a5b4fc">Relat\u00f3rio de Candidatos Aprovados<\/div><\/div><div style="text-align:right"><div style="font-size:11px;color:#a5b4fc">Gerado em<\/div><div style="font-size:13px;color:#fff;font-weight:500">'+date+' \u00e0s '+time+'<\/div><\/div><\/div>'
    +'<div style="background:#eef2ff;border:1px solid #c7d2fe;border-radius:10px;padding:16px 20px;margin-bottom:24px"><div style="font-size:18px;font-weight:700;color:#4f46e5;margin-bottom:4px">'+job.title+'<\/div><div style="font-size:12px;color:#64748b">'+(job.dept||'')+' \u00b7 Aberta em '+fmtDate(job.openDate)+' \u00b7 '+candidates.length+' candidato'+(candidates.length>1?'s':'')+' aprovado'+(candidates.length>1?'s':'')+'<\/div><\/div>'
    +cards
    +'<div style="text-align:center;margin-top:24px;padding-top:16px;border-top:1px solid #e2e8f0"><div style="font-size:11px;color:#94a3b8">R&S RH \u00b7 Documento confidencial \u00b7 '+date+'<\/div><\/div><\/div><\/body><\/html>';
  var url=URL.createObjectURL(new Blob([html],{type:'text/html'}));
  window.open(url,'_blank');
  setTimeout(function(){URL.revokeObjectURL(url);},60000);
}




</script>
<script>

const {createApp,ref,computed,watch,onMounted}=Vue;
createApp({
  template: document.getElementById('app-tpl').textContent,
  errorCaptured(err){
    var el=document.getElementById('vue-err');
    if(el){el.textContent='Erro: '+err.message;el.style.display='block';}
    return false;
  },
  setup(){
    // ── AUTH ──────────────────────────────────────────────────────────────
    var currentUser=ref(null);
    function greeting(){var h=new Date().getHours();return h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';}
    function rsLogout(){
      try{localStorage.removeItem('rsrh_user');}catch(e){}
      currentUser.value=null;
      var el=document.getElementById('rs-login');
      if(el){el.classList.remove('rs-hidden');el.style.display='flex';}
      var u=document.getElementById('rs-u');var p=document.getElementById('rs-p');
      if(u)u.value=''; if(p)p.value='';
    }
    // Session restore
    (function(){
      try{
        var s=localStorage.getItem('rsrh_user');
        if(s&&window.RS_USERS){
          var found=window.RS_USERS.find(function(x){return x.id===s;});
          if(found){
            currentUser.value=found;
            var el=document.getElementById('rs-login');
            if(el)el.classList.add('rs-hidden');
          }
        }
      }catch(e){}
    })();
    window._vueSetUser=function(u){
      currentUser.value=u;
      var el=document.getElementById('rs-login');
      if(el)el.classList.add('rs-hidden');
    };
    var navItems=[{id:'dashboard',label:'Dashboard',icon:'ti-layout-dashboard'},{id:'jobs',label:'Vagas',icon:'ti-briefcase'},{id:'candidates',label:'Candidatos',icon:'ti-users'},{id:'pipeline',label:'Pipeline',icon:'ti-git-merge'},{id:'analyze',label:'Analisar currículo',icon:'ti-file-search'},{id:'banco',label:'Banco de talentos',icon:'ti-database'}];
    var nav=ref('dashboard'),prevNav=ref('dashboard');
    var jobs=ref(lsGet('recruitarh_jobs',[]));
    var candidates=ref(lsGet('recruitarh_candidates',[]));
    var notes=ref(lsGet('recruitarh_notes',{}));
    var transcripts=ref(lsGet('recruitarh_transcripts',{}));
    var summaries=ref(lsGet('recruitarh_summaries',{}));
    var intDates=ref(lsGet('recruitarh_intdates',{}));
    var apiKey=ref(DEFAULT_API_KEY||lsGet('recruitarh_apikey',''));
    var showApiModal=ref(!apiKey.value),newApiKey=ref('');
    var showJobModal=ref(false),editingJob=ref(null);
    var jf=ref({title:'',dept:'',desc:'',leaderEmail:'',openDate:today()});
    var ejf=ref({title:'',dept:'',desc:'',leaderEmail:'',openDate:'',closedDate:''});
    var selJobId=ref(''),pdfFile=ref(null),isDragging=ref(false);
    var isAnalyzing=ref(false),analyzeStep=ref(''),latestResult=ref(null);
    var viewCand=ref(null),error=ref(''),pipFilter=ref('all'),saveMsg=ref('');
    var isGenSum=ref(false),genSumStep=ref('');
    var alertTab=ref('cand');
    var detTab=ref('ai');
    var candSearch=ref('');var insightFilter=ref(null);var filterMonth=ref('');
    // JSONBin sync
    var jbKey=ref(DEFAULT_JB_KEY||lsGet('recruitarh_jbkey',''));
    var jbBin=ref(DEFAULT_JB_BIN||lsGet('recruitarh_jbbin',''));
    var jbStatus=ref('');
    var showSyncModal=ref(false);
    var jbKeyInput=ref('');
    var jbExistingId=ref('');
    var jbCreating=ref(false);
    // Summary field editing
    var editingField=ref(null);
    var editFieldVal=ref('');

    watch(jobs,       function(v){lsSet('recruitarh_jobs',v);},       {deep:true});
    watch(candidates, function(v){lsSet('recruitarh_candidates',v);}, {deep:true});
    watch(notes,      function(v){lsSet('recruitarh_notes',v);},      {deep:true});
    watch(transcripts,function(v){lsSet('recruitarh_transcripts',v);},{deep:true});
    watch(summaries,  function(v){lsSet('recruitarh_summaries',v);},  {deep:true});
    watch(intDates,   function(v){lsSet('recruitarh_intdates',v);},   {deep:true});
    watch(jbKey,      function(v){lsSet('recruitarh_jbkey',v);});
    watch(jbBin,      function(v){lsSet('recruitarh_jbbin',v);});

    function flash(msg){saveMsg.value=msg;setTimeout(function(){saveMsg.value='';},2500);}
    function goTo(page){
      prevNav.value=nav.value;
      nav.value=page;
      insightFilter.value=null; // reset insight filter on normal navigation
    }
    // Navigate with a pre-applied insight filter (bypasses reset)
    function goToFiltered(page,filter){
      prevNav.value=nav.value;
      insightFilter.value=filter||null;
      nav.value=page;
    }
    // inPeriod: checks if a date string matches filterMonth ("YYYY-MM")
    // Supports DD/MM/YYYY (candidates) and YYYY-MM-DD (jobs)
    function inPeriod(dateStr){
      var fm=filterMonth.value;
      if(!fm||!dateStr)return true;
      var yr=fm.slice(0,4),mo=fm.slice(5,7);
      if(dateStr.indexOf('/')>-1){
        var p=dateStr.split('/');
        return p.length>=3&&p[1]===mo&&p[2].slice(0,4)===yr;
      }
      return dateStr.slice(0,7)===fm;
    }
    var availableMonths=computed(function(){
      var s=new Set();
      candidates.value.forEach(function(c){
        if(c.submittedAt){var p=c.submittedAt.split('/');if(p.length>=3)s.add(p[2].slice(0,4)+'-'+p[1]);}
      });
      jobs.value.forEach(function(j){if(j.openDate)s.add(j.openDate.slice(0,7));});
      return Array.from(s).sort().reverse().map(function(m){
        var d=new Date(m+'-01T12:00:00');
        var lbl=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
        return {value:m,label:lbl.charAt(0).toUpperCase()+lbl.slice(1)};
      });
    });
    var filterMonthLabel=computed(function(){
      if(!filterMonth.value)return null;
      var d=new Date(filterMonth.value+'-01T12:00:00');
      var lbl=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
      return lbl.charAt(0).toUpperCase()+lbl.slice(1);
    });
    function goBack(){nav.value=prevNav.value;}
    function openDetail(c){viewCand.value=c;goTo('detail');}

    // ── JSONBin sync ──────────────────────────────────────────────────────
    function getAllData(){
      var slimCandidates = candidates.value.map(function(c){
        var slim = Object.assign({},c);
        delete slim.pdfBase64;  // exclude PDF binary — too large for JSONBin
        return slim;
      });
      return {jobs:jobs.value,candidates:slimCandidates,notes:notes.value,transcripts:transcripts.value,summaries:summaries.value,intDates:intDates.value};
    }

    // ── SLA stats ─────────────────────────────────────────────────────────────
    var ORIGENS=[
      {key:'linkedin',label:'LinkedIn',c:'#2563EB'},
      {key:'indicacao',label:'Indicação',c:'#16A34A'},
      {key:'site',label:'Site da empresa',c:'#EA580C'},
      {key:'banco',label:'Banco interno',c:'#7C3AED'},
      {key:'externo',label:'Divulgação externa',c:'#0891B2'},
      {key:'outro',label:'Outra origem',c:'#94A3B8'},
    ];
    var origemData=computed(function(){
      var bancoC=candidates.value.filter(function(c){return c.status==='banco';});
      var total=bancoC.length||1;
      return ORIGENS.map(function(o){
        var count=bancoC.filter(function(c){return (c.origem||'outro')===o.key;}).length;
        return {l:o.label,v:Math.round(count/total*100)||0,c:o.c,n:count};
      }).filter(function(o){return o.n>0;});
    });
    function calcSlaStats(){
      var on=0,near=0,over=0;
      (jobs.value||[]).filter(function(j){return j.status==='aberta';}).forEach(function(j){
        var d=bizDaysSince(j.openDate);
        if(d>10)over++;else if(d>=8)near++;else on++;
      });
      return {on:on,near:near,over:over};
    }
    var slaStats=ref(calcSlaStats());
    watch(jobs,function(){slaStats.value=calcSlaStats();},{deep:true});

    function proximaAcao(job){
      var pend=pending(job.id);
      if(pend.length>0)return pend.length+' candidato(s) aguardando líder';
      var jc=jobCands(job.id);
      var inRH=jc.filter(function(c){return c.status==='entrevista_rh';}).length;
      if(inRH>0)return 'Entrevista RH em andamento ('+inRH+')';
      var inLider=jc.filter(function(c){return c.status==='entrevista_lider';}).length;
      if(inLider>0)return 'Entrevista líder em andamento ('+inLider+')';
      var inProp=jc.filter(function(c){return c.status==='proposta';}).length;
      if(inProp>0)return 'Proposta enviada — aguardando resposta';
      if(jc.length===0)return 'Aguardando currículos';
      var inTriage=jc.filter(function(c){return c.status==='aguardando_lider';}).length;
      if(inTriage>0)return inTriage+' candidato(s) aprovado(s) na triagem';
      return 'Triagem em andamento';
    }

    var strategicStats=computed(function(){
      var cands=candidates.value.filter(function(c){return inPeriod(c.submittedAt||c.createdAt);});
      var hired=cands.filter(function(c){return c.status==='contratado';});
      var vagasPorArea={};
      jobs.value.filter(function(j){return j.status==='aberta';}).forEach(function(j){
        var a=j.dept||'Sem área'; vagasPorArea[a]=(vagasPorArea[a]||0)+1;
      });
      var contratacoesPorArea={};
      hired.forEach(function(c){
        var job=jobs.value.find(function(j){return j.id===c.jobId;});
        var a=(job&&job.dept)||'Sem área'; contratacoesPorArea[a]=(contratacoesPorArea[a]||0)+1;
      });
      var origemTotal={};
      cands.forEach(function(c){var o=c.origem||'linkedin'; origemTotal[o]=(origemTotal[o]||0)+1;});
      var origemConv={};
      hired.forEach(function(c){var o=c.origem||'linkedin'; origemConv[o]=(origemConv[o]||0)+1;});
      var totalCands=cands.length||1;
      var maxVagas=Math.max.apply(null,Object.values(vagasPorArea).concat([1]));
      var maxContr=Math.max.apply(null,Object.values(contratacoesPorArea).concat([1]));
      function convColor(pct){return pct>=30?'#16A34A':pct>=10?'#EA580C':'#94A3B8';}
      return {
        vagasPorArea:Object.entries(vagasPorArea).sort(function(a,b){return b[1]-a[1];}).map(function(e){return {area:e[0],count:e[1],pct:Math.round(e[1]/maxVagas*100)};}),
        contratacoesPorArea:Object.entries(contratacoesPorArea).sort(function(a,b){return b[1]-a[1];}).map(function(e){return {area:e[0],count:e[1],pct:Math.round(e[1]/maxContr*100)};}),
        origemTotal:Object.entries(origemTotal).sort(function(a,b){return b[1]-a[1];}).map(function(e){
          var conv=origemConv[e[0]]||0;
          var convPct=e[1]>0?Math.round(conv/e[1]*100):0;
          return {origem:e[0],count:e[1],pct:Math.round(e[1]/totalCands*100),conv:conv,convPct:convPct,convColor:convColor(convPct)};
        }),
        totalCands:cands.length,
        totalHired:hired.length
      };
    });
    var filteredCands=computed(function(){
      var list=candidates.value.filter(function(c){return inPeriod(c.submittedAt);});
      if(pipFilter.value!=='all')list=list.filter(function(c){return c.jobId===pipFilter.value;});
      if(insightFilter.value==='alta_aderencia')list=list.filter(function(c){return c.analysis&&c.analysis.score&&c.analysis.score.total>=80;});
      if(insightFilter.value==='aguardando_lider')list=list.filter(function(c){return c.status==='aguardando_lider';});
      if(candSearch.value.trim()){
        var s=candSearch.value.trim().toLowerCase();
        list=list.filter(function(c){return c.name.toLowerCase().includes(s)||(c.jobTitle||'').toLowerCase().includes(s);});
      }
      return list;
    });

    function isVagaCrit(job){ return job.status==='aberta'&&bizDaysSince(job.openDate)>10; }

    function applyData(d){
      if(!d)return;
      if(d.jobs)jobs.value=d.jobs;
      if(d.candidates){
        // Preserve local pdfBase64 for candidates already in local storage
        var localPdfs = {};
        candidates.value.forEach(function(c){ if(c.pdfBase64) localPdfs[c.id]=c.pdfBase64; });
        candidates.value = d.candidates.map(function(c){
          return localPdfs[c.id] ? Object.assign({},c,{pdfBase64:localPdfs[c.id]}) : c;
        });
      }
      if(d.notes)notes.value=d.notes;
      if(d.transcripts)transcripts.value=d.transcripts;
      if(d.summaries)summaries.value=d.summaries;
      if(d.intDates)intDates.value=d.intDates;
    }
    function pushSync(){jsonBinPush(jbKey.value,jbBin.value,getAllData());}
    function pullSync(){
      jsonBinPull(jbKey.value,jbBin.value).then(function(d){
        if(d){applyData(d);jbStatus.value='Sincronizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
      });
    }
    function saveSyncConfig(){
      if(!jbKeyInput.value.trim())return;
      var key=jbKeyInput.value.trim();
      var existingId=(jbExistingId.value||'').trim();
      if(existingId){
        jbKey.value=key;jbBin.value=existingId;
        jbKeyInput.value='';jbExistingId.value='';
        showSyncModal.value=false;
        pullSync();
        flash('Conectado! Sincronizando...');
      } else {
        jbCreating.value=true;
        jsonBinCreate(key).then(function(id){
          if(id){jbKey.value=key;jbBin.value=id;jbKeyInput.value='';jbExistingId.value='';showSyncModal.value=false;pushSync();flash('Compartilhamento ativado!');}
          else{flash('Erro: verifique a chave JSONBin');}
          jbCreating.value=false;
        });
      }
    }
    function deactivateSync(){jbKey.value='';jbBin.value='';jbStatus.value='';flash('Compartilhamento desativado');}

    onMounted(function(){
      if(jbKey.value&&jbBin.value){
        pullSync();
        setInterval(pullSync,10000);
        document.addEventListener('visibilitychange',function(){
          if(!document.hidden&&jbKey.value&&jbBin.value)pullSync();
        });
      }
    });

    // ── Summary field editing ─────────────────────────────────────────────
    function startEdit(cid,field,val){
      editingField.value={cid:cid,field:field};
      editFieldVal.value=Array.isArray(val)?val.join('\n'):val||'';
    }
    function saveEdit(cid,field){
      var s=Object.assign({},summaries.value);
      s[cid]=Object.assign({},s[cid]);
      var arr=['pontosPositivos','pontosAtencao'];
      if(arr.indexOf(field)>=0){
        s[cid][field]=editFieldVal.value.split('\n').map(function(l){return l.trim();}).filter(Boolean);
      } else {
        s[cid][field]=editFieldVal.value;
      }
      summaries.value=s;
      if(viewCand.value&&viewCand.value.id===cid)viewCand.value=Object.assign({},viewCand.value);
      editingField.value=null;editFieldVal.value='';
      flash('Campo atualizado');
      pushSync();
    }
    function cancelEdit(){editingField.value=null;editFieldVal.value='';}
    function isEditing(cid,field){return editingField.value&&editingField.value.cid===cid&&editingField.value.field===field;}

    // ── Jobs ──────────────────────────────────────────────────────────────
    function addJob(){
      if(!jf.value.title.trim()||!jf.value.desc.trim())return;
      jobs.value.push({id:Date.now()+'',title:jf.value.title,dept:jf.value.dept,desc:jf.value.desc,leaderEmail:jf.value.leaderEmail,openDate:jf.value.openDate||today(),status:'aberta'});
      jf.value={title:'',dept:'',desc:'',leaderEmail:'',openDate:today()};
      showJobModal.value=false;flash('Vaga criada');pushSync();
    }
    function openEdit(job){editingJob.value=job;ejf.value={title:job.title,dept:job.dept||'',desc:job.desc,leaderEmail:job.leaderEmail||'',openDate:job.openDate||today(),closedDate:job.closedDate||''};}
    function saveJob(){
      if(!ejf.value.title.trim()||!ejf.value.desc.trim())return;
      var i=jobs.value.findIndex(function(j){return j.id===editingJob.value.id;});
      if(i>=0){
        Object.assign(jobs.value[i],{title:ejf.value.title,dept:ejf.value.dept,desc:ejf.value.desc,leaderEmail:ejf.value.leaderEmail,openDate:ejf.value.openDate||today()});
        if(ejf.value.closedDate){jobs.value[i].closedDate=ejf.value.closedDate;jobs.value[i].status='encerrada';jobs.value[i].timeToFill=businessDays(new Date(ejf.value.openDate||jobs.value[i].openDate),new Date(ejf.value.closedDate));}
        else{jobs.value[i].closedDate='';if(jobs.value[i].status==='encerrada'){jobs.value[i].status='aberta';jobs.value[i].timeToFill=null;}}
      }
      editingJob.value=null;flash('Vaga atualizada');pushSync();
    }

    // ── Analyze ───────────────────────────────────────────────────────────
    function handleFile(file){
      if(!file)return;
      if(file.type!=='application/pdf'){error.value='Apenas PDFs.';return;}
      if(file.size>10*1024*1024){error.value='M\u00e1ximo 10 MB.';return;}
      error.value='';pdfFile.value=file;
    }
    function onFileDrop(e){e.preventDefault();isDragging.value=false;handleFile(e.dataTransfer.files[0]);}
    function analyze(){
      if(!apiKey.value){showApiModal.value=true;return;}
      if(!selJobId.value){error.value='Selecione uma vaga.';return;}
      if(!pdfFile.value){error.value='Anexe o curr\u00edculo.';return;}
      var job=jobs.value.find(function(j){return j.id===selJobId.value;});if(!job)return;
      isAnalyzing.value=true;error.value='';latestResult.value=null;analyzeStep.value='Lendo PDF...';
      readBase64(pdfFile.value).then(function(base64){
        analyzeStep.value='Analisando...';
        return fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey.value,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4000,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:base64}},{type:'text',text:buildPrompt(job)}]}]})}).then(function(r){return r.json();}).then(function(data){
          analyzeStep.value='Processando...';
          if(data.error)throw new Error(data.error.message);
          var raw=data.content.map(function(i){return i.text||'';}).join('');
          var parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
          var initStatus=parsed.recommendation==='Avan\u00e7ar para entrevista'?'aguardando_lider':parsed.recommendation==='Manter em banco de talentos'?'banco':'reprovado';
          var newC={id:Date.now()+'',name:parsed.candidateName||pdfFile.value.name.replace('.pdf',''),email:parsed.candidateEmail||'',jobId:selJobId.value,jobTitle:job.title,submittedAt:new Date().toLocaleString('pt-BR'),pdfName:pdfFile.value.name,pdfBase64:base64,status:initStatus,statusHistory:[{status:initStatus,at:new Date().toLocaleString('pt-BR')}],analysis:parsed,sentToLeader:false};
          candidates.value.push(newC);latestResult.value=newC;pdfFile.value=null;selJobId.value='';flash('Candidato salvo');pushSync();
          isAnalyzing.value=false;analyzeStep.value='';
        });
      }).catch(function(e){error.value='Erro: '+e.message;isAnalyzing.value=false;analyzeStep.value='';});
    }

    // ── Pipeline ──────────────────────────────────────────────────────────
    function advanceStatus(cid,toStatus){
      var now=new Date();var i=candidates.value.findIndex(function(c){return c.id===cid;});if(i<0)return;
      candidates.value[i].status=toStatus;
      candidates.value[i].statusHistory=(candidates.value[i].statusHistory||[]).concat([{status:toStatus,at:now.toLocaleString('pt-BR')}]);
      if(toStatus==='contratado'){var ji=jobs.value.findIndex(function(j){return j.id===candidates.value[i].jobId;});if(ji>=0&&!jobs.value[ji].closedDate){jobs.value[ji].status='encerrada';jobs.value[ji].closedDate=now.toISOString().split('T')[0];jobs.value[ji].timeToFill=businessDays(new Date(jobs.value[ji].openDate),now);}}
      if(viewCand.value&&viewCand.value.id===cid)viewCand.value=Object.assign({},candidates.value[i]);
      flash('Etapa atualizada');pushSync();
    }

    // ── Notes / Summary ───────────────────────────────────────────────────
    function saveNote(cid,text){var n=Object.assign({},notes.value);n[cid]=text;notes.value=n;pushSync();}
    function getNote(cid){return notes.value[cid]||'';}
    function getTranscript(cid){return transcripts.value[cid]||'';}
    function setTranscript(cid,txt){var t=Object.assign({},transcripts.value);t[cid]=txt;transcripts.value=t;}
    function getSummary(cid){return summaries.value[cid]||null;}
    function getIntDate(cid){return intDates.value[cid]||'';}
    function setIntDate(cid,d){var v=Object.assign({},intDates.value);v[cid]=d;intDates.value=v;}

    function generateInterviewSummary(candidate){
      var transcript=getTranscript(candidate.id);if(!transcript.trim())return;
      if(!apiKey.value){showApiModal.value=true;return;}
      isGenSum.value=true;genSumStep.value='Analisando entrevista...';
      fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey.value,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,messages:[{role:'user',content:buildInterviewPrompt(candidate,getTranscript(candidate.id))}]})})
      .then(function(r){return r.json();}).then(function(data){
        if(data.error)throw new Error(data.error.message);
        var raw=data.content.map(function(i){return i.text||'';}).join('');
        var parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
        var s=Object.assign({},summaries.value);s[candidate.id]=parsed;summaries.value=s;
        if(viewCand.value&&viewCand.value.id===candidate.id)viewCand.value=Object.assign({},viewCand.value);
        flash('Resumo gerado');isGenSum.value=false;genSumStep.value='';pushSync();
      }).catch(function(e){flash('Erro: '+e.message);isGenSum.value=false;genSumStep.value='';});
    }
    function dlParecer(candidate){
      var s=getSummary(candidate.id);if(!s){flash('Gere o resumo primeiro');return;}
      generateParecer(candidate,s,getIntDate(candidate.id));
    }
    function downloadAnalysisPDF(candidate){
      if(!candidate||!candidate.analysis){flash('Nenhuma análise disponível para este candidato.');return;}
      generateAnalysisPDF(candidate);
    }
    function summaryMailto(candidate){
      var s=getSummary(candidate.id);if(!s)return;
      var job=jobs.value.find(function(j){return j.id===candidate.jobId;});
      var isPos=s.recomendacao==='Avan\u00e7ar para entrevista com o l\u00edder';
      var pos=(s.pontosPositivos||[]).map(function(p,i){return (i+1)+'. '+p;}).join('\n');
      var neg=(s.pontosAtencao||[]).map(function(p,i){return (i+1)+'. '+p;}).join('\n');
      var sal=s.expectativaSalarial&&s.expectativaSalarial.trim()?'\nEXPECTATIVA SALARIAL: '+s.expectativaSalarial:'';
      var disp=s.disponibilidade&&s.disponibilidade.trim()?'\nDISPONIBILIDADE: '+s.disponibilidade:'';
      var body='Ol\u00e1,\n\nSegue o parecer da entrevista realizada com '+candidate.name+' para a vaga de '+candidate.jobTitle+'.\n\nMOTIVA\u00c7\u00d5ES:\n'+s.motivacoes+'\n\nMOMENTO ATUAL:\n'+s.momentoAtual+'\n\nPONTOS POSITIVOS:\n'+pos+'\n\nPONTOS DE ATEN\u00c7\u00c3O:\n'+neg+(sal||disp?('\n\nINFORMA\u00c7\u00d5ES COMPLEMENTARES:'+sal+disp):'')+'\n\nIMPRESS\u00c3O GERAL DO RH:\n'+s.impressaoGeral+'\n\nRECOMENDA\u00c7\u00c3O: '+s.recomendacao+'\n\n'+s.justificativa+'\n\n'+(isPos?'Aguardamos seu retorno para agendar a entrevista com o l\u00edder.':'Optamos por n\u00e3o avan\u00e7ar com o(a) candidato(a).')+'\n\nAtenciosamente,\n[SEU NOME]\nRecursos Humanos';
      var subject=encodeURIComponent('[R&S RH] Parecer \u2014 '+candidate.name+' | '+candidate.jobTitle);
      window.location.href='mailto:'+(job&&job.leaderEmail?job.leaderEmail:'')+'?subject='+subject+'&body='+encodeURIComponent(body);
    }
    function sendToLeader(job){
      var pend=candidates.value.filter(function(c){return c.jobId===job.id&&c.status==='aguardando_lider';});
      if(!pend.length)return;
      generateSummaryPDF(job,pend);setTimeout(function(){window.location.href=buildMailto(job,pend);},800);
      pend.forEach(function(c){var i=candidates.value.findIndex(function(x){return x.id===c.id;});if(i>=0)candidates.value[i].sentToLeader=true;});
      flash('Relat\u00f3rio aberto!');pushSync();
    }
    function saveApiKey(){if(newApiKey.value.trim()){apiKey.value=newApiKey.value.trim();lsSet('recruitarh_apikey',apiKey.value);}showApiModal.value=false;}

    // ── Computed ──────────────────────────────────────────────────────────
    var closedJobs=computed(function(){
      return jobs.value.filter(function(j){return j.status==='encerrada'&&j.timeToFill&&inPeriod(j.closedDate||j.openDate);});
    });
    var metrics=computed(function(){
      // Period-filtered candidates
      var cands=candidates.value.filter(function(c){return inPeriod(c.submittedAt);});
      var ttfs=closedJobs.value.map(function(j){return j.timeToFill;});
      var scored=cands.filter(function(c){return c.analysis&&c.analysis.score&&c.analysis.score.total>0;});
      return {
        openJobs:jobs.value.filter(function(j){return j.status==='aberta';}).length, // always current
        encerradas:closedJobs.value.length,
        total:cands.length,
        pipeline:cands.filter(function(c){return !['banco','reprovado','contratado'].includes(c.status);}).length,
        contratados:cands.filter(function(c){return c.status==='contratado';}).length,
        avgScore:scored.length?Math.round(scored.reduce(function(s,c){return s+(c.analysis.score.total||0);},0)/scored.length):0,
        avgTTF:ttfs.length?Math.round(ttfs.reduce(function(a,b){return a+b;},0)/ttfs.length):null,
        minTTF:ttfs.length?Math.min.apply(null,ttfs):null,
        maxTTF:ttfs.length?Math.max.apply(null,ttfs):null
      };
    });
    var dashCards=computed(function(){var m=metrics.value;return [{label:'Vagas abertas',value:m.openJobs,sub:'em andamento',col:'#4f46e5',link:'jobs',icon:'ti-briefcase'},{label:'Vagas encerradas',value:m.encerradas,sub:'preenchidas',col:'#166534',link:'jobs',icon:'ti-check'},{label:'Curr\u00edculos triados',value:m.total,sub:'pela triagem',col:'#0369a1',link:'candidates',icon:'ti-file-text'},{label:'No pipeline',value:m.pipeline,sub:'em avalia\u00e7\u00e3o',col:'#b45309',link:'pipeline',icon:'ti-git-merge'},{label:'Contratados',value:m.contratados,sub:'processos conclu\u00eddos',col:'#0f766e',link:'candidates',icon:'ti-user-check'},{label:'Score m\u00e9dio',value:m.avgScore||0,sub:'pontua\u00e7\u00e3o de 0 a 100',col:'#6d28d9',link:'candidates',icon:'ti-star'},{label:'Time to Fill m\u00e9dio',value:m.avgTTF?m.avgTTF+'d':'--',sub:'dias \u00fateis (m\u00e9dia)',col:'#4f46e5',link:'jobs',icon:'ti-clock'},{label:'TTF m\u00ednimo',value:m.minTTF?m.minTTF+'d':'--',sub:'processo mais r\u00e1pido',col:'#166534',link:'jobs',icon:'ti-trending-up'},{label:'TTF m\u00e1ximo',value:m.maxTTF?m.maxTTF+'d':'--',sub:'processo mais longo',col:'#991b1b',link:'jobs',icon:'ti-trending-down'}];});
    function jobCands(jobId){return candidates.value.filter(function(c){return c.jobId===jobId;});}
    function pending(jobId){return candidates.value.filter(function(c){return c.jobId===jobId&&c.status==='aguardando_lider';});}
    function hired(jobId){return candidates.value.filter(function(c){return c.jobId===jobId&&c.status==='contratado';}).length;}
    function daysSince(d){return Math.max(0,Math.floor((Date.now()-new Date(d))/86400000));}
    function bizDaysSince(d){
      if(!d)return 0;
      var start=new Date(d);start.setHours(0,0,0,0);
      var end=new Date();end.setHours(0,0,0,0);
      var count=0,cur=new Date(start);
      while(cur<=end){var dw=cur.getDay();if(dw!==0&&dw!==6)count++;cur.setDate(cur.getDate()+1);}
      return Math.max(0,count);
    }
    var filtCands=computed(function(){
      var list=candidates.value.filter(function(c){return inPeriod(c.submittedAt);});
      if(pipFilter.value!=='all')list=list.filter(function(c){return c.jobId===pipFilter.value;});
      return list;
    });
    var vcTrans=computed(function(){return viewCand.value?(TRANSITIONS[viewCand.value.status]||[]):[];});
    var scoreBars=computed(function(){if(!viewCand.value||!viewCand.value.analysis)return[];var sc=viewCand.value.analysis.score||{};return [{l:'Hard Skills',v:sc.hardSkills||0,m:50,pct:sc.hardSkills?Math.round(sc.hardSkills/50*100):0},{l:'Experi\u00eancia',v:sc.experience||0,m:25,pct:sc.experience?Math.round(sc.experience/25*100):0},{l:'Soft Skills',v:sc.softSkills||0,m:15,pct:sc.softSkills?Math.round(sc.softSkills/15*100):0},{l:'Fit cultural',v:sc.culturalFit||0,m:10,pct:sc.culturalFit?Math.round(sc.culturalFit/10*100):0}];});
    var execBlocks=computed(function(){if(!viewCand.value||!viewCand.value.analysis)return[];var e=viewCand.value.analysis.executiveSummary||{};return [{l:'Pontos fortes',t:e.strengths,bg:'#dcfce7',c:'#166534'},{l:'Pontos de aten\u00e7\u00e3o',t:e.attentionPoints,bg:'#fef3c7',c:'#b45309'},{l:'Motivo da recomenda\u00e7\u00e3o',t:e.reasoning,bg:'#dbeafe',c:'#1d4ed8'}];});
    var summaryRows=computed(function(){
      var s=viewCand.value?getSummary(viewCand.value.id):null;if(!s)return[];
      var isPos=s.recomendacao==='Avançar para entrevista com o líder';
      var rows=[
        {label:'Motivações',field:'motivacoes',value:s.motivacoes,bg:'#f0f9ff',col:'#0369a1'},
        {label:'Motivadores para mudança',field:'motivadoresMudanca',value:s.motivadoresMudanca,bg:'#fdf4ff',col:'#7e22ce'},
        {label:'Interesse na vaga',field:'interesseVaga',value:s.interesseVaga,bg:'#fff7ed',col:'#c2410c'},
        {label:'Expectativas de carreira',field:'expectativasCarreira',value:s.expectativasCarreira,bg:'#f0fdf4',col:'#166534'},
        {label:'Momento atual',field:'momentoAtual',value:s.momentoAtual,bg:'#f8fafc',col:'#475569'},
        {label:'Impressão geral',field:'impressaoGeral',value:s.impressaoGeral,bg:'#f8fafc',col:'#475569'},
        {label:'Justificativa da recomendação',field:'justificativa',value:s.justificativa,bg:isPos?'#dcfce7':'#fee2e2',col:isPos?'#166534':'#991b1b'},
      ];
      return rows.filter(function(r){return r.value;});
    });

    
    // ── Manual candidate + delete ──────────────────────────────────────────
    var showManualModal=ref(false);
    var mf=ref({name:'',email:'',jobId:'',origem:'',note:''});
    var mfError=ref('');

    function addManualCandidate(){
      if(!mf.value.name.trim()){mfError.value='Nome obrigatório.';return;}
      if(!mf.value.jobId){mfError.value='Selecione a vaga.';return;}
      if(!mf.value.origem){mfError.value='Selecione a origem do currículo.';return;}
      var job=jobs.value.find(function(j){return j.id===mf.value.jobId;});
      var id='mc-'+Date.now();
      var cand={
        id:id,
        name:mf.value.name.trim(),
        email:mf.value.email.trim(),
        jobId:mf.value.jobId,
        jobTitle:job?job.title:'',
        origem:mf.value.origem,
        status:'aguardando_lider',
        submittedAt:new Date().toLocaleString('pt-BR'),
        score:0,
        createdAt:new Date().toISOString(),
        analysis:null,
        history:[{date:new Date().toISOString(),action:'Cadastrado manualmente',from:'',to:'aguardando_lider'}],
      };
      candidates.value.push(cand);
      if(mf.value.note.trim()) saveNote(id,mf.value.note.trim());
      showManualModal.value=false;
      pushSync();
      flash('Candidato cadastrado!');
    }

    function setCandField(id, field, val){
      var i=candidates.value.findIndex(function(c){return c.id===id;});
      if(i<0)return;
      var updated=Object.assign({},candidates.value[i]);
      updated[field]=val;
      candidates.value[i]=updated;
      if(viewCand.value&&viewCand.value.id===id)viewCand.value=candidates.value[i];
      pushSync();
    }
    function deleteCandidate(id){
      if(!confirm('Excluir este candidato? A ação não pode ser desfeita.'))return;
      candidates.value=candidates.value.filter(function(c){return c.id!==id;});
      viewCand.value=null;
      pushSync();
      flash('Candidato excluído.');
    }

    // ── Edit Análise do Perfil ───────────────────────────────────────────
    var editAnaMode=ref(false);
    var editAnaFields=ref({});
    function startEditAnalysis(cand){
      var a=cand.analysis||{};
      var es=a.executiveSummary||{};
      var comp=a.comparison||{};
      editAnaFields.value={
        classification:a.classification||'',
        recommendation:a.recommendation||'',
        strengths:es.strengths||'',
        attentionPoints:es.attentionPoints||'',
        reasoning:es.reasoning||'',
        matched:(comp.matched||[]).join('\n'),
        missing:(comp.missing||[]).join('\n'),
      };
      editAnaMode.value=true;
    }
    function saveAnalysis(cand){
      var i=candidates.value.findIndex(function(c){return c.id===cand.id;});
      if(i<0)return;
      var f=editAnaFields.value;
      var a=Object.assign({},candidates.value[i].analysis);
      a.classification=f.classification;
      a.recommendation=f.recommendation;
      a.executiveSummary=Object.assign({},a.executiveSummary||{},{
        strengths:f.strengths,
        attentionPoints:f.attentionPoints,
        reasoning:f.reasoning
      });
      a.comparison=Object.assign({},a.comparison||{},{
        matched:f.matched.split('\n').map(function(s){return s.trim();}).filter(Boolean),
        missing:f.missing.split('\n').map(function(s){return s.trim();}).filter(Boolean)
      });
      candidates.value[i]=Object.assign({},candidates.value[i],{analysis:a});
      viewCand.value=candidates.value[i];
      editAnaMode.value=false;
      flash('Análise atualizada');
      pushSync();
    }
    function cancelEditAnalysis(){editAnaMode.value=false;}

    return {
      navItems,nav,currentUser,greeting,rsLogout,jobs,candidates,notes,apiKey,showApiModal,newApiKey,
      showJobModal,editingJob,jf,ejf,selJobId,pdfFile,isDragging,
      isAnalyzing,analyzeStep,latestResult,viewCand,error,pipFilter,saveMsg,
      isGenSum,genSumStep,metrics,dashCards,filtCands,vcTrans,scoreBars,execBlocks,summaryRows,STAGES,
      jbKey,jbBin,jbStatus,showSyncModal,jbKeyInput,jbCreating,jbExistingId,
      editingField,editFieldVal,
      flash,goTo,goBack,goToFiltered,openDetail,addJob,openEdit,saveJob,handleFile,onFileDrop,analyze,
      advanceStatus,saveNote,getNote,getTranscript,setTranscript,getSummary,getIntDate,setIntDate,
      generateInterviewSummary,dlParecer,downloadAnalysisPDF,summaryMailto,sendToLeader,saveApiKey,
      saveSyncConfig,deactivateSync,pushSync,pullSync,
      startEdit,saveEdit,cancelEdit,isEditing,
      scoreColor,scoreBgCol,stageMeta,recMeta,fitMeta,initials,fmtDate,daysSince,slaStats,proximaAcao,origemData,filteredCands,isVagaCrit,alertTab,detTab,candSearch,insightFilter,filterMonth,availableMonths,filterMonthLabel,strategicStats,showManualModal,mf,mfError,addManualCandidate,deleteCandidate,setCandField,editAnaMode,editAnaFields,startEditAnalysis,saveAnalysis,cancelEditAnalysis,
      jobCands,pending,hired,downloadPdf,businessDays,bizDaysSince,ORIGENS,    };
  }
}).mount('#app');


</script>
</body>
</html>
